<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>How It Works | Creator Portal</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/portal.css') }}">
        <script src="https://kit.fontawesome.com/b612a3a6e6.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://use.typekit.net/inw0enr.css">
    </head>
    <body style="background-color: #f8f4f4;">
        <div class="sidebar">
            <a href="/portal" class="unset-a" title="home"><i class="fa-solid fa-house fa-2xl opacity-hover icon-selected"></i></a>
            <a href="/portal/media" class="unset-a" title="media"><i class="fa-solid fa-image fa-2xl opacity-hover"></i></a>
            <div id="profile-icon-container">
                <a href="/portal/profile" class="unset-a" title="profile"><i class="fa-solid fa-user fa-2xl opacity-hover"></i></a>
            </div>
        </div>
        <div id="article-container">
            <p id="article-container-label">Your Articles</p>
            <div id="visibility-selector">
                <div id="published-selector" class="selector-button selected" onclick="setSelectedVisibility('published');">
                    <p>Published</p> 
                    <span class="selector-count">0</span>
                </div>
                <div id="drafts-selector" class="selector-button" onclick="setSelectedVisibility('drafts');">
                    <p>Drafts</p> 
                    <span class="selector-count">0</span>
                </div>
                <div id="deleted-selector" class="selector-button" onclick="setSelectedVisibility('deleted');">
                    <p>Deleted</p> 
                    <span class="selector-count">0</span>
                </div>
            </div>
            <div id="article-grid">
                <div class="article-grid-item add-article" title="create new article" onclick="window.location.href = '/portal/post'">
                    <p>+</p>
                </div>
            </div>
        </div>
        <script>
            function setSelectedVisibility(selector) {
                const selected = document.querySelector('.selected');
                if (selected !== null) {
                    selected.classList.remove('selected');
                }

                const selectorID = `${selector}-selector`;
                document.getElementById(selectorID).classList.add('selected');
            }
        </script>
    </body>
</html>
