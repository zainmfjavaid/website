<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>How It Works | Creator Login</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
        <link rel="stylesheet" href="https://use.typekit.net/inw0enr.css">
    </head>
    <body>
        <form action="/portal/login" method="POST">
            <input type="text" name="username" required autofocus placeholder="username" autocomplete="off">
            <input type="password" name="password" required placeholder="password" autocomplete="off">
            <input type="submit" style="width:100px; height:50px; background-color:blue">
        </form>
    </body>
</html>
